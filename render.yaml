services:
  # Backend Service (Django)
  - type: web
    name: salon-backend
    runtime: docker
    envVars:
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: salon-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  # Frontend Service (React Static Site)
  - type: web
    name: salon-front
    runtime: static
    buildCommand: "cd salon_front && npm install && npm run build"
    staticPublishPath: "salon_front/dist"
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_TELEGRAM_BOT_USERNAME
        sync: false
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: salon-db
    databaseName: salon
    user: salon_user
    plan: free
